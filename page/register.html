<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="/css/register.css">
   <title>Rikkei Cinema - Đăng Ký</title>
</head>

<body>
   <header class="navbar">
      <div class="logo">
         <span class="wordIcon1"><strong>Rikkei</strong></span>
         <span class="wordIcon2"><strong>Cinema</strong></span>
      </div>
      <nav>
         <ul class="toolBar">
            <li><a href="#">Trang Chủ</a></li>
            <li><a href="#">Thông Tin</a></li>
            <li><a href="#">Liên Hệ</a></li>
            <li><button class="btn-login">Đăng Nhập</button></li>
         </ul>
      </nav>
   </header>

   <main class="loginContainer">
      <div class="loginCard">
         <h2>Tạo tài khoản mới</h2>
         <p>Đăng ký để đặt vé xem phim ngay hôm nay</p>

         <form class="formInput"> 
            <div class="input">
               <label>Email</label>
               <input type="email" placeholder="Nhập email của bạn">
            </div>

            <div class="input">
               <label>Mật khẩu</label>
               <input type="password" placeholder="Nhập mật khẩu của bạn">
            </div>

            <div class="checkbox">
               <label>
                  <input type="checkbox"> Ghi nhớ đăng nhập
               </label>
               <a href="#">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="submitBtn">Đăng nhập</button>

            <p class="noLogin">
               Bạn chưa có tài khoản?
               <a class="register" href="#"><strong>Đăng ký ngay</strong></a>
            </p>
         </form>
      </div>
   </main>
</body>

</html>
